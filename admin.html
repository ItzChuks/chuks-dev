<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Chuks Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: ['selector', '[data-theme="dark"]'],
      theme: { extend: { fontFamily: { grotesk: ['Space Grotesk'], inter: ['Inter'], mono: ['JetBrains Mono'] } } }
    }
  </script>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="admin.css"/>
  <style>
    /* ── Override Tailwind utilities for responsive layout ── */
    @media (max-width: 768px) {
      aside.admin-sidebar {
        display: none !important;
        visibility: hidden !important;
        width: 0 !important;
      }
      .admin-main {
        margin-left: 0 !important;
        padding-top: 64px !important;
      }
      .admin-header {
        top: 64px !important;
        padding: 12px 16px !important;
      }
      .admin-topbar {
        display: flex !important;
      }
    }
    @media (max-width: 600px) {
      .admin-main {
        padding-top: 58px !important;
      }
      .admin-header {
        top: 58px !important;
        padding: 10px 14px !important;
      }
      .admin-topbar {
        padding: 12px 14px !important;
      }
    }
    @media (max-width: 400px) {
      .admin-header p#panel-sub {
        display: none !important;
      }
    }
  </style>
</head>
<body class="font-inter" id="body">

  <!-- ── LOGIN SCREEN ── -->
  <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="login-card">
      <div class="text-center mb-8">
        <span class="font-grotesk font-bold text-2xl">
          <span class="text-accent">&lt;</span>Admin<span class="text-accent">/&gt;</span>
        </span>
        <p class="text-[var(--subtext)] text-sm mt-2 font-mono">// portfolio control panel</p>
      </div>
      <div class="space-y-4">
        <div class="field-group">
          <label class="field-label">Email</label>
          <input type="email" id="login-email" class="field-input" placeholder="you@example.com"/>
        </div>
        <div class="field-group">
          <label class="field-label">Password</label>
          <input type="password" id="login-password" class="field-input" placeholder="••••••••"/>
        </div>
        <div id="login-error" class="hidden text-red-400 text-sm font-mono text-center py-1"></div>
        <button id="login-btn" class="w-full btn-primary py-3 mt-2">
          <span id="login-btn-text">Sign In</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── ADMIN DASHBOARD ── -->
  <div id="admin-dashboard" class="hidden min-h-screen">

    <!-- MOBILE TOPBAR -->
    <div class="admin-topbar">
      <span class="admin-topbar-logo font-grotesk">
        <span class="text-accent">&lt;</span>Admin<span class="text-accent">/&gt;</span>
      </span>
      <div class="admin-topbar-right">
        <span class="text-[var(--subtext)] text-xs font-mono hidden" id="user-label-mobile"></span>
        <button id="theme-toggle-admin" class="theme-btn" aria-label="Toggle theme">
          <span id="theme-icon-admin">🌙</span>
        </button>
        <div class="hamburger-admin" id="drawer-toggle" aria-label="Open menu">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- MOBILE DRAWER -->
    <div class="mobile-drawer" id="mobile-drawer">
      <div class="drawer-overlay" id="drawer-overlay"></div>
      <div class="drawer-panel">
        <nav class="drawer-nav">
          <button class="sidebar-link active" data-panel="projects" onclick="showPanel('projects'); closeDrawer()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Projects
          </button>
          <button class="sidebar-link" data-panel="add" onclick="showPanel('add'); closeDrawer()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Add Project
          </button>
        </nav>
        <div class="drawer-footer">
          <a href="index.html" class="sidebar-link text-sm">← View Portfolio</a>
          <button id="logout-btn-mobile" class="sidebar-link text-red-400 text-sm">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
    </div>

    <!-- DESKTOP SIDEBAR -->
    <aside class="admin-sidebar fixed left-0 top-0 bottom-0 z-40 flex flex-col">
      <div class="p-6 border-b border-[var(--border)]">
        <span class="font-grotesk font-bold text-lg">
          <span class="text-accent">&lt;</span>Admin<span class="text-accent">/&gt;</span>
        </span>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <button class="sidebar-link active" data-panel="projects">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Projects
        </button>
        <button class="sidebar-link" data-panel="add">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Add Project
        </button>
      </nav>
      <div class="p-4 border-t border-[var(--border)]">
        <span class="block font-mono text-xs text-[var(--subtext)] px-2 mb-3 truncate" id="user-label"></span>
        <a href="index.html" class="sidebar-link text-sm mb-1">← View Portfolio</a>
        <button id="logout-btn" class="sidebar-link text-red-400 text-sm w-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">

      <!-- Desktop Header -->
      <header class="admin-header">
        <div>
          <h1 class="font-grotesk font-bold text-xl" id="panel-title">Projects</h1>
          <p class="text-[var(--subtext)] text-sm font-mono" id="panel-sub">// manage your portfolio projects</p>
        </div>
        <div class="hidden md:flex items-center gap-3">
          <button id="theme-toggle-admin-desktop" class="theme-btn" aria-label="Toggle theme">
            <span id="theme-icon-admin-desktop">🌙</span>
          </button>
        </div>
      </header>

      <!-- PROJECTS LIST PANEL -->
      <div id="panel-projects" class="admin-panel">
        <div class="flex items-center justify-between mb-5 gap-3">
          <p class="text-[var(--subtext)] font-mono text-sm">
            <span id="project-count">0</span> projects
          </p>
          <button class="btn-primary text-sm py-2 px-4 whitespace-nowrap" onclick="showPanel('add')">
            + Add New
          </button>
        </div>
        <div id="admin-projects-list" class="space-y-3"></div>
        <div id="admin-empty" class="hidden text-center py-20">
          <p class="font-mono text-[var(--subtext)] text-sm">// no projects yet</p>
          <button class="btn-outline mt-4 text-sm py-2 px-4" onclick="showPanel('add')">
            Add your first project
          </button>
        </div>
      </div>

      <!-- ADD / EDIT PROJECT PANEL -->
      <div id="panel-add" class="admin-panel hidden">
        <div class="add-form-card">
          <h2 class="font-grotesk font-semibold text-lg mb-6" id="form-heading">Add New Project</h2>

          <!-- Row 1: Title + Stack -->
          <div class="grid form-grid-2 gap-4 mb-4" style="grid-template-columns: repeat(2, 1fr);">
            <div class="field-group">
              <label class="field-label">Project Title *</label>
              <input type="text" id="proj-title" class="field-input" placeholder="My Awesome Project"/>
            </div>
            <div class="field-group">
              <label class="field-label">Tech Stack (comma-separated) *</label>
              <input type="text" id="proj-stack" class="field-input" placeholder="React, Node.js, MongoDB"/>
            </div>
          </div>

          <!-- Description -->
          <div class="field-group mb-4">
            <label class="field-label">Description</label>
            <textarea id="proj-desc" class="field-input resize-none" rows="3"
              placeholder="Brief description of what this project does..."></textarea>
          </div>

          <!-- Row 2: URLs -->
          <div class="grid form-grid-2 gap-4 mb-4" style="grid-template-columns: repeat(2, 1fr);">
            <div class="field-group">
              <label class="field-label">Live URL</label>
              <input type="url" id="proj-live" class="field-input" placeholder="https://myproject.com"/>
            </div>
            <div class="field-group">
              <label class="field-label">GitHub URL</label>
              <input type="url" id="proj-github" class="field-input" placeholder="https://github.com/chuks/project"/>
            </div>
          </div>

          <!-- Image Upload -->
          <div class="field-group mb-2">
            <label class="field-label">Project Screenshot</label>
            <div id="image-drop-zone" class="image-drop-zone" onclick="document.getElementById('proj-image').click()">
              <div id="drop-placeholder">
                <svg class="mx-auto mb-2 text-[var(--subtext)]" width="28" height="28" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21,15 16,10 5,21"/>
                </svg>
                <p class="text-[var(--subtext)] text-sm">Click to upload screenshot</p>
                <p class="text-[var(--subtext)] text-xs mt-1 font-mono">PNG, JPG, WebP · max 5MB</p>
              </div>
              <img id="image-preview" class="hidden max-h-48 mx-auto rounded-xl object-cover" alt="Preview"/>
            </div>
            <input type="file" id="proj-image" accept="image/*" class="hidden"/>
          </div>

          <input type="hidden" id="edit-doc-id"/>
          <input type="hidden" id="edit-image-id"/>

          <div id="form-error" class="hidden text-red-400 text-sm font-mono mt-3"></div>
          <div id="form-success" class="hidden text-green-400 text-sm font-mono mt-3"></div>

          <!-- Action Buttons -->
          <div class="form-actions">
            <button id="save-project-btn" class="btn-primary py-3 px-6">
              <span id="save-btn-text">Save Project</span>
            </button>
            <button class="btn-outline py-3 px-5" onclick="resetForm(); showPanel('projects')">
              Cancel
            </button>
            <button id="delete-project-btn"
              class="delete-btn hidden py-3 px-5 rounded-xl border border-red-500/30 text-red-400 text-sm font-medium hover:bg-red-500/10 transition-colors cursor-pointer"
              style="background:none;">
              Delete
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="appwrite.js"></script>
  <script src="admin.js"></script>
  <script>
    // ── DRAWER TOGGLE ──
    const drawer = document.getElementById('mobile-drawer');
    document.getElementById('drawer-toggle').addEventListener('click', () => {
      drawer.classList.add('open');
    });
    document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
    function closeDrawer() {
      drawer.classList.remove('open');
    }

    // ── DESKTOP THEME TOGGLE (second button) ──
    const desktopToggle = document.getElementById('theme-toggle-admin-desktop');
    const desktopIcon   = document.getElementById('theme-icon-admin-desktop');
    if (desktopToggle) {
      desktopToggle.addEventListener('click', () => {
        const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('portfolio-theme', theme);
        document.getElementById('theme-icon-admin').textContent  = theme === 'dark' ? '🌙' : '☀️';
        desktopIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
      });
    }

    // ── MOBILE LOGOUT ──
    document.getElementById('logout-btn-mobile')?.addEventListener('click', async () => {
      try { await getAccount().deleteSession('current'); } catch {}
      location.reload();
    });
  </script>
</body>
</html>
